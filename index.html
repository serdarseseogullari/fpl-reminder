<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPL Deadline Reminders</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .badge {
      display: inline-block;
      background: #37003c;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.85rem 1.25rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-google { background: #4285F4; color: #fff; }
    .btn-apple  { background: #1a1a2e; color: #fff; }

    .btn svg {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }

    /* Google copy panel */
    .google-steps {
      display: none;
      margin-top: 0.5rem;
      background: #f0f4ff;
      border-radius: 10px;
      padding: 1rem;
      text-align: left;
    }

    .google-steps.open { display: block; }

    .google-steps ol {
      padding-left: 1.2rem;
      color: #444;
      font-size: 0.85rem;
      line-height: 1.8;
      margin-bottom: 0.75rem;
    }

    .google-steps ol li a {
      color: #4285F4;
      font-weight: 600;
      text-decoration: none;
    }

    .url-copy {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      border: 1px solid #dde3f0;
      border-radius: 8px;
      padding: 0.5rem 0.65rem;
    }

    .url-copy code {
      flex: 1;
      font-size: 0.72rem;
      color: #333;
      word-break: break-all;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .copy-btn {
      flex-shrink: 0;
      background: #4285F4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .copy-btn:hover { opacity: 0.85; }
    .copy-btn.copied { background: #34a853; }

    .note {
      margin-top: 1.75rem;
      font-size: 0.78rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Fantasy Premier League</span>
    <h1>Deadline Reminders</h1>
    <p class="subtitle">Subscribe to get a calendar reminder 1 hour before every FPL gameweek deadline.</p>

    <div class="buttons">

      <!-- Google Calendar: always shows copy-URL panel (Google Calendar app on iOS does not support webcal://) -->
      <button class="btn btn-google" id="googleBtn" onclick="toggleGoogle()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="4" fill="white"/>
          <path d="M7 10h10M7 14h6" stroke="#4285F4" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="3" y="3" width="18" height="5" rx="2" fill="#4285F4"/>
          <text x="12" y="19" text-anchor="middle" fill="#4285F4" font-size="6" font-weight="bold" font-family="sans-serif">31</text>
        </svg>
        Add to Google Calendar
      </a>

      <div class="google-steps" id="googleSteps">
        <ol>
          <li>Copy the URL below</li>
          <li>Open <a href="https://calendar.google.com/calendar/r/settings/addbyurl" target="_blank" rel="noopener">Google Calendar → Settings → From URL</a></li>
          <li>Paste and click <strong>Add calendar</strong></li>
        </ol>
        <div class="url-copy">
          <code id="icsUrl">https://serdarseseogullari.github.io/fpl-reminder/calendar.ics</code>
          <button class="copy-btn" id="copyBtn" onclick="copyUrl()">Copy</button>
        </div>
      </div>

      <!-- Apple Calendar: webcal:// opens Calendar.app on iOS/macOS, hidden on Android -->
      <a class="btn btn-apple" id="appleBtn" href="webcal://serdarseseogullari.github.io/fpl-reminder/calendar.ics">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="20" height="18" rx="3" fill="white"/>
          <rect x="2" y="4" width="20" height="6" rx="3" fill="#FF3B30"/>
          <rect x="2" y="7" width="20" height="3" fill="#FF3B30"/>
          <text x="12" y="19" text-anchor="middle" fill="#1a1a2e" font-size="7" font-weight="bold" font-family="sans-serif">17</text>
          <line x1="7" y1="2" x2="7" y2="6" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="17" y1="2" x2="17" y2="6" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Add to Apple Calendar
      </a>

    </div>

    <p class="note">Updates every 6 hours. All 38 gameweek deadlines included.</p>
  </div>

  <script>
    const ICS_URL = 'https://serdarseseogullari.github.io/fpl-reminder/calendar.ics';
    const isAndroid = /Android/i.test(navigator.userAgent);

    // Apple Calendar doesn't exist on Android — hide the button
    if (isAndroid) {
      document.getElementById('appleBtn').style.display = 'none';
    }

    function toggleGoogle() {
      document.getElementById('googleSteps').classList.toggle('open');
    }

    function copyUrl() {
      const btn = document.getElementById('copyBtn');
      navigator.clipboard.writeText(ICS_URL).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
